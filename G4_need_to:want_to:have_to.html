<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>need to~ / want to~ / have to~ </title>

<style>
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic",sans-serif;
  background:#fff9e6;
  padding:20px;
  text-align:center;
  font-size:20px;
}

h1{
  font-size:32px;
  margin-bottom:20px;
}

.frame{
  max-width:900px;
  margin:auto;
  background:#ffffff;
  border:3px solid #f2c94c;
  border-radius:16px;
  padding:24px;
}

#jp{
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:16px 0;
}

#answerRow{
  min-height:80px;
  border:3px dashed #bbb;
  border-radius:12px;
  padding:12px;
}

.card{
  background:#e6f5e6;
  padding:14px 18px;
  border-radius:12px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
  box-shadow:2px 2px 6px rgba(0,0,0,.2);
}

button{
  padding:12px 24px;
  font-size:20px;
  border-radius:12px;
  margin:6px;
}

#message{
  font-size:24px;
  font-weight:bold;
  height:32px;
  margin-top:10px;
}

#nextBtn,
#speakBtn{
  display:none;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>need to~ / want to~ / have to~ </h1>

<div class="frame">
  <div id="jp"></div>

  <div class="row" id="answerRow"></div>
  <div class="row" id="cardRow"></div>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="shuffleCards()">Shuffle 🔀</button>
  <button id="nextBtn" onclick="nextQ()">Next ▶</button>
  <button id="speakBtn" onclick="speak()">🔊 音声を聞く</button>
  <button onclick="makePDF()">📄 PDF</button>

  <div id="message"></div>
</div>

<canvas id="confetti"></canvas>

<script>
const questions = [

{jp:"トムは今日公園でサッカーをしたがっています。",en:"Tom wants to play soccer in the park today."},

{jp:"多くの子どもたちは放課後にゲームをしたがっています。",en:"Many children want to play games after school."},

{jp:"私の姉は今テレビを見たがっています。",en:"My sister wants to watch TV now."},

{jp:"母は温かいお茶を飲みたいと思っています。",en:"My mother would like to drink some hot tea."},

{jp:"父は週末に京都を訪れたいと思っています。",en:"My father would like to visit Kyoto this weekend."},

{jp:"多くの学生は毎日英語を勉強する必要があります。",en:"Many students need to study English every day."},

{jp:"私たちは今日教室を掃除する必要があります。",en:"We need to clean the classroom today."},

{jp:"彼は明日早く起きなければなりません。",en:"He has to get up early tomorrow."},

{jp:"彼女は今日このレポートを終えなければなりません。",en:"She has to finish this report today."},

{jp:"多くの人はもっと運動をする必要があります。",en:"Many people need to exercise more."},

{jp:"あなたは今日宿題を終えなければなりませんか。",en:"Do you have to finish your homework today?"},

{jp:"あなたは今水を飲みたいですか。",en:"Would you like to drink some water now?"},

{jp:"彼は今日学校に行かなければなりませんか。",en:"Does he have to go to school today?"},

{jp:"あなたは今日英語を勉強する必要がありますか。",en:"Do you need to study English today?"},

{jp:"あなたは今日友だちに会いたいですか。",en:"Do you want to see your friend today?"},

{jp:"トムは疲れているので今日はサッカーをしたくありません。",en:"Tom does not want to play soccer today because he is tired."},

{jp:"彼女は忙しいので今日はテレビを見たくありません。",en:"She does not want to watch TV today because she is busy."},

{jp:"彼は寒いので外で遊びたくありません。",en:"He does not want to play outside because it is cold."},

{jp:"私はお腹がいっぱいなので昼ごはんを食べたくありません。",en:"I do not want to eat lunch because I am full."},

{jp:"彼女は眠いので今日は勉強したくありません。",en:"She does not want to study today because she is sleepy."}

];

let cur=0;

/* ⭐ カンマ・ピリオドを単語扱い */
function wordsOf(i){
  return questions[i].en
    .replace(/([.,?])/g," $1 ")
    .trim()
    .split(/\s+/);
}

function loadQ(){
  message.textContent="";
  nextBtn.style.display="none";
  speakBtn.style.display="none";
  jp.textContent=(cur+1)+") "+questions[cur].jp;
  answerRow.innerHTML="";
  cardRow.innerHTML="";

  shuffle(wordsOf(cur)).forEach(w=>{
    const c=document.createElement("div");
    c.className="card";
    c.textContent=w;
    c.onclick=()=>toggle(c);
    cardRow.appendChild(c);
  });
}

function toggle(card){
  if(card.parentElement.id==="cardRow"){
    answerRow.appendChild(card);
  }else{
    cardRow.appendChild(card);
  }
}

/* ⭐ スペース完全一致修正版 */
function checkAnswer(){
  const user=[...answerRow.children]
    .map(c=>c.textContent)
    .join(" ")
    .replace(/\s+/g," ")
    .trim();

  const correct=wordsOf(cur).join(" ");

  if(user===correct){
    message.textContent="Correct! 🎉";
    nextBtn.style.display="inline-block";
    speakBtn.style.display="inline-block";
  }else{
    message.textContent="Try again ❌";
  }
}

function shuffleCards(){
  [...answerRow.children].forEach(c=>cardRow.appendChild(c));
  shuffle([...cardRow.children]).forEach(c=>cardRow.appendChild(c));
  message.textContent="";
  nextBtn.style.display="none";
  speakBtn.style.display="none";
}

function nextQ(){
  cur++;
  if(cur<questions.length){
    loadQ();
  }else{
    message.textContent="All Done! 🎊";
    startConfetti();
  }
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-.5);
}

function speak(){
  const u=new SpeechSynthesisUtterance(questions[cur].en);
  u.lang="en-US";
  u.rate=0.7;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

loadQ();

function makePDF(){
  const w=window.open("");
  w.document.write(`
  <html><head><style>
  body{font-family:"Hiragino Maru Gothic ProN";padding:24px;}
  h2{text-align:center;margin-bottom:20px;}
  .q{margin-bottom:28px;page-break-inside:avoid;}
  .words{font-size:13px;margin:6px 0 14px 0;}
  .line{
  border-bottom:1px solid #000;
  height:12px;
  margin-top:2px;
}
  .answer{margin-bottom:10px;}
  .page-break{page-break-before:always;}
  </style></head><body>
  <h2>need to~ / want to~ / have to~ </h2>
  Name: __________________　Date: ____________<br><br>
  `);

  /* ⭐ 問題ページ */
  questions.forEach((q,i)=>{
    const wds=shuffle(wordsOf(i)).join(" / ");
    w.document.write(`
      <div class="q">
        ${i+1}) ${q.jp}<br>
        <div class="words">${wds}</div>
        <div class="line"></div>
　　　　　<div class="line"></div>
      </div>
    `);
  });

  /* ⭐ 改ページ */
  w.document.write(`
    <div class="page-break"></div>
    <h2>Answer</h2>
  `);

  /* ⭐ 答えページ */
  questions.forEach((q,i)=>{
    w.document.write(`
      <div class="answer">
        ${i+1}) ${q.en}
      </div>
    `);
  });

  w.document.write("</body></html>");
  w.document.close();
  w.print();
}




</script>
</body>
</html>
